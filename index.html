<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin DiCenzo | UPGRADR AUDIO | The Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* TRON PALETTE */
            --primary: #00eaff; /* The classic Tron Cyan */
            --primary-glow: rgba(0, 234, 255, 0.5);
            --secondary: #ffffff;
            --dark: #020204; /* Almost pure black */
            --darker-blue: #050a14;
            --panel-bg: rgba(0, 20, 30, 0.8); /* Glassy dark blue */
            --text: #e0ffff; /* Slightly cool white */
            --text-muted: #7ab0d6;
            --border: rgba(0, 234, 255, 0.3);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        h1, h2, h3, h4, .logo, .cta-button, .book-btn {
            font-family: 'Orbitron', sans-serif; /* Tech font for headers */
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        
        /* TRON GRID BACKGROUND */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 234, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 234, 255, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -2;
            perspective: 1000px;
            transform-style: preserve-3d;
            animation: grid-move 15s linear infinite;
        }

        /* Subtle distant glow */
        .bg-grid::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, var(--dark) 80%);
            z-index: -1;
        }
        
        @keyframes grid-move {
            0% { transform: translateY(0) translateZ(0); }
            100% { transform: translateY(60px) translateZ(0); }
        }
        
        /* Header & Nav */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(2, 2, 4, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px
